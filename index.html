<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Order Dispatch | Terraboost Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCDYgNIGcfWPxoux2EILXr60ZK0fZYJPR4&libraries=geometry"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .brand-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .form-card { border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        #map { height: 400px; width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; }
        label { color: #475569; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.7rem; display: block; margin-bottom: 6px; }
        input, textarea { border: 1px solid #cbd5e1; border-radius: 10px !important; padding: 12px; font-size: 14px; width: 100%; background: #ffffff; }
        .signature-font { font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: #0f172a; border-bottom: 2px solid #94a3b8; background: transparent; width: 100%; }
        .status-pill { transition: all 0.2s; cursor: pointer; border: 2px solid #e2e8f0; }
        input[type="radio"]:checked + .status-pill { border-color: currentColor; transform: translateY(-2px); }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="captureArea" class="max-w-5xl mx-auto form-card bg-white border border-slate-200">
        <div class="brand-gradient p-10 text-white flex justify-between items-center no-print">
            <div class="flex items-center gap-6">
                <div class="bg-white p-2 rounded-lg"><div class="bg-slate-900 text-white font-black text-3xl px-4 py-2 rounded">TBM</div></div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-white">Terraboost Media</h1>
                    <p class="text-blue-400 text-xs uppercase font-black tracking-widest opacity-90">Logistics & Route Authorization</p>
                </div>
            </div>
        </div>

        <form id="dispatchForm" class="p-8 md:p-12 space-y-10">
            <div id="setupFields" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div><label>Dispatcher Email</label><input type="email" id="d_email" value="logistics@terraboost.com" required></div>
                    <div><label>Contractor Name</label><input type="text" id="ic_name_setup" required></div>
                    <div><label>Contractor Email</label><input type="email" id="ic_email_setup" required></div>
                    <div><label>Work Order #</label><input type="text" id="task_num" required></div>
                    <div><label>Compensation ($)</label><input type="number" id="comp" required></div>
                    <div><label>Due Date</label><input type="date" id="due_date" required></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 border-t pt-10">
                    <div class="space-y-6">
                        <label class="text-blue-600 font-black flex justify-between">Route Locations <span id="calcStatus" class="text-[9px] text-slate-400 italic"></span></label>
                        <textarea id="locations" rows="12" placeholder="Paste addresses here..." oninput="calculateLargeRoute()"></textarea>
                        <div class="bg-slate-900 rounded-3xl p-8 text-white flex justify-between items-center shadow-2xl">
                            <div><p class="text-slate-400 text-[10px] uppercase font-black tracking-widest">Distance</p><span id="mileage_display" class="text-4xl font-black text-emerald-400">0.0</span><span class="text-emerald-400 font-bold text-xs ml-1">MI</span></div>
                            <div class="text-right"><p class="text-slate-400 text-[10px] uppercase font-black tracking-widest">Drive Time</p><span id="time_display" class="text-4xl font-black text-blue-400">--</span></div>
                        </div>
                    </div>
                    <div><div id="map"></div></div>
                </div>
                <button type="button" onclick="generateCertifiedLink()" class="w-full brand-gradient text-white font-black py-5 rounded-2xl shadow-xl text-xs uppercase tracking-widest">Generate Authorization Link</button>
            </div>

            <div id="icMode" class="hidden space-y-10">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                    <div class="space-y-8">
                        <h3 class="text-sm font-black text-slate-800 uppercase border-b pb-4">Decision</h3>
                        <div class="flex gap-6 no-print">
                            <label class="flex-1 text-emerald-700"><input type="radio" name="status" value="Accepted" class="hidden" onchange="toggleDecision('Accepted')" checked><div class="status-pill bg-emerald-50 p-5 rounded-2xl text-center font-black text-xs uppercase tracking-widest">Accept</div></label>
                            <label class="flex-1 text-red-700"><input type="radio" name="status" value="Declined" class="hidden" onchange="toggleDecision('Declined')"><div class="status-pill bg-red-50 p-5 rounded-2xl text-center font-black text-xs uppercase tracking-widest">Decline</div></label>
                        </div>
                        <button type="button" onclick="viewRoute()" class="w-full bg-slate-800 text-white font-black py-5 rounded-2xl flex items-center justify-center gap-4">🗺️ VIEW NAVIGATION</button>
                        <div id="summaryZone" class="bg-slate-50 p-8 rounded-3xl border space-y-4 text-sm"></div>
                    </div>
                    <div class="space-y-8 bg-white p-8 rounded-3xl border shadow-sm">
                        <div id="acceptFields" class="space-y-8">
                            <div><label class="text-blue-600 font-black">Signature</label><input type="text" id="typed_sig" oninput="updateSigPreview()" class="signature-font focus:ring-0 border-none"></div>
                            <label class="flex items-start gap-4 text-xs italic"><input type="checkbox" id="legal_consent" class="mt-1"> I authorize this assignment.</label>
                        </div>
                        <div id="declineFields" class="hidden space-y-4">
                            <label class="text-red-600 font-black">Counter Offer ($)</label><input type="number" id="counter_comp">
                            <label class="text-red-600 font-black">Reason</label><textarea id="decline_reason"></textarea>
                        </div>
                        <button type="button" id="submitBtn" onclick="submitAuthorization()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest">Submit Authorization</button>
                    </div>
                </div>
            </div>

            <div id="auditTrail" class="hidden mt-12 pt-8 border-t text-[9px] text-slate-400 font-mono uppercase">
                <div class="grid grid-cols-2 gap-8"><div><p id="audit_id"></p><p id="audit_ts"></p></div><div class="text-right"><p id="audit_ua"></p></div></div>
            </div>

            <div id="successView" class="hidden text-center py-20 space-y-6">
                <div class="text-6xl">✅</div>
                <h2 class="text-3xl font-black uppercase text-slate-900">Recorded</h2>
                <p class="text-slate-500">The TBM dispatch team has been notified.</p>
            </div>
        </form>
    </div>

    <script>
        let map, directionsService, directionsRenderer;
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), { zoom: 4, center: { lat: 39.8, lng: -98.5 }, disableDefaultUI: true });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map });
        }

        let throttle;
        async function calculateLargeRoute() {
            clearTimeout(throttle);
            document.getElementById('calcStatus').innerText = "Analyzing...";
            throttle = setTimeout(async () => {
                const lines = document.getElementById('locations').value.split('\n').filter(l => l.trim().length > 5);
                if (lines.length < 2) return;
                
                let totalM = 0, totalS = 0;
                // Google limit fix: Chunk in 10s
                for (let i = 0; i < lines.length - 1; i += 10) {
                    const chunk = lines.slice(i, i + 11);
                    const req = {
                        origin: chunk[0], destination: chunk[chunk.length-1],
                        waypoints: chunk.slice(1,-1).map(l => ({location: l, stopover: true})),
                        optimizeWaypoints: true, travelMode: 'DRIVING'
                    };
                    await new Promise(r => directionsService.route(req, (res, stat) => {
                        if (stat === 'OK') {
                            if (i === 0) directionsRenderer.setDirections(res);
                            res.routes[0].legs.forEach(leg => { totalM += leg.distance.value; totalS += leg.duration.value; });
                        }
                        setTimeout(r, 400);
                    }));
                }
                document.getElementById('mileage_display').innerText = (totalM * 0.000621371).toFixed(1);
                const h = Math.floor(totalS / 3600), m = Math.floor((totalS % 3600) / 60);
                document.getElementById('time_display').innerText = h > 0 ? h+"h "+m+"m" : m+"m";
                document.getElementById('calcStatus').innerText = "Optimized";
            }, 1000);
        }

        function toggleDecision(c) {
            document.getElementById('acceptFields').classList.toggle('hidden', c === 'Declined');
            document.getElementById('declineFields').classList.toggle('hidden', c === 'Accepted');
            document.getElementById('submitBtn').className = c === 'Accepted' ? "w-full bg-blue-600 text-white font-black py-5 rounded-2xl" : "w-full bg-red-600 text-white font-black py-5 rounded-2xl";
        }

        function generateCertifiedLink() {
            const d = {
                de: document.getElementById('d_email').value, icn: document.getElementById('ic_name_setup').value,
                ice: document.getElementById('ic_email_setup').value, wo: document.getElementById('task_num').value,
                comp: document.getElementById('comp').value, mi: document.getElementById('mileage_display').innerText,
                time: document.getElementById('time_display').innerText, due: document.getElementById('due_date').value,
                locs: document.getElementById('locations').value.split('\n').filter(l => l.trim().length > 2).join('|')
            };
            const payload = btoa(unescape(encodeURIComponent(JSON.stringify(d))));
            const link = `${window.location.origin}${window.location.pathname}?data=${payload}`;
            navigator.clipboard.writeText(link);
            window.location.href = `mailto:${d.ice}?subject=WO ${d.wo}&body=Authorize here: ${link}`;
            alert("Link Copied!");
        }

        window.onload = () => {
            initMap();
            const params = new URLSearchParams(window.location.search);
            const raw = params.get('data');
            if (raw) {
                const d = JSON.parse(decodeURIComponent(escape(atob(raw))));
                document.getElementById('setupFields').remove();
                document.getElementById('icMode').classList.remove('hidden');
                document.getElementById('summaryZone').innerHTML = `
                    <div class="flex justify-between"><strong>Contractor:</strong> <span>${d.icn}</span></div>
                    <div class="flex justify-between text-blue-600"><strong>WO #:</strong> <span>${d.wo}</span></div>
                    <div class="flex justify-between"><strong>Mileage:</strong> <span>${d.mi} Miles</span></div>
                    <div class="flex justify-between"><strong>Due:</strong> <span>${d.due}</span></div>
                    <div class="flex justify-between border-t pt-2 mt-2"><strong>Comp:</strong> <span class="text-emerald-600 font-black">$${d.comp}</span></div>
                `;
                window.payloadData = d;
            }
        };

        function viewRoute() {
            const stops = window.payloadData.locs.split('|');
            window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(stops[0])}&destination=${encodeURIComponent(stops[stops.length-1])}&waypoints=${encodeURIComponent(stops.slice(1,-1).join('|'))}`, '_blank');
        }

        async function submitAuthorization() {
            const status = document.querySelector('input[name="status"]:checked').value;
            const txID = `TBM-${window.payloadData.wo}-${Math.random().toString(36).substr(2, 4).toUpperCase()}`;
            const formData = new FormData();
            formData.append('_subject', `WO ${window.payloadData.wo} ${status.toUpperCase()}`);
            formData.append('Status', status);
            formData.append('Contractor', window.payloadData.icn);
            formData.append('WO', window.payloadData.wo);
            formData.append('ID', txID);
            formData.append('_replyto', window.payloadData.ice);

            try {
                await fetch('https://formspree.io/f/meerlqll', { method: 'POST', body: formData, headers: {'Accept': 'application/json'} });
                if (status === 'Accepted') await html2pdf().set({ margin: 0.5, filename: `TBM_${window.payloadData.wo}.pdf` }).from(document.getElementById('captureArea')).save();
                document.getElementById('icMode').style.display = 'none';
                document.getElementById('successView').classList.remove('hidden');
            } catch (e) { alert("Error submitting"); }
        }
    </script>
</body>
</html>
