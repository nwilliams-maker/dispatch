<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Order Dispatcher | Terraboost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCDYgNIGcfWPxoux2EILXr60ZK0fZYJPR4&libraries=geometry"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .brand-blue { background-color: #4477ce; }
        .form-card { border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        #map { height: 350px; width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; }
        label { color: #334155; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.7rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-4xl mx-auto form-card bg-white border border-gray-100">
        <div class="brand-blue p-6 text-white flex justify-between items-center">
            <div class="flex items-center gap-4 text-white">
                <div class="bg-white/20 p-2 rounded-lg font-bold text-xl border border-white/30 text-center w-12 text-white text-white">TB</div>
                <div>
                    <h1 class="text-2xl font-bold leading-tight text-white">Work Order Dispatcher</h1>
                    <p class="text-blue-100 text-[10px] uppercase font-bold tracking-widest opacity-80 text-white">Route Optimization & Modern Dispatch</p>
                </div>
            </div>
        </div>

        <form id="dispatchForm" class="p-8 space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label>Worker Name (IC)</label>
                    <input type="text" id="ic_name" placeholder="Worker Name" required 
                        class="w-full border border-gray-200 rounded-lg p-3 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label>Worker Email Address</label>
                    <input type="email" id="ic_email" placeholder="worker@email.com" required 
                        class="w-full border border-gray-200 rounded-lg p-3 bg-blue-50 text-sm border-blue-200 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label>Work Order / Task #</label>
                    <input type="text" id="task_num" placeholder="WO-0000" required 
                        class="w-full border border-gray-200 rounded-lg p-3 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label>Compensation ($)</label>
                    <input type="number" id="comp" step="0.01" placeholder="0.00" 
                        class="w-full border border-gray-200 rounded-lg p-3 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label>Due Date</label>
                    <input type="date" id="due_date" required 
                        class="w-full border border-gray-200 rounded-lg p-3 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <hr class="border-gray-100">

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                <div class="space-y-4">
                    <label class="text-blue-600 font-black">Route Locations (One per line)</label>
                    <textarea id="locations" rows="6" 
                        placeholder="1. Start Address&#10;2. Stop A&#10;3. Stop B&#10;4. End Address" 
                        class="w-full border border-gray-200 rounded-xl p-4 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 font-mono text-xs text-black shadow-inner leading-relaxed"></textarea>
                    
                    <div class="bg-slate-900 rounded-2xl p-6 text-white shadow-xl flex justify-between items-center divide-x divide-slate-700">
                        <div class="flex-1 pr-4">
                            <p class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-1">Total Distance</p>
                            <span id="mileage_display" class="text-4xl font-black text-emerald-400 leading-none">0.0</span>
                            <span class="text-slate-500 text-xs font-bold ml-1 uppercase">mi</span>
                        </div>
                        <div class="flex-1 pl-6">
                            <p class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-1">Drive Time</p>
                            <span id="time_display" class="text-4xl font-black text-blue-400 leading-none">--</span>
                        </div>
                    </div>
                </div>

                <div>
                    <div id="map"></div>
                    <p id="status_msg" class="text-[9px] text-slate-400 italic text-center uppercase tracking-widest font-black mt-2 text-slate-400 font-bold">Awaiting entry...</p>
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="button" onclick="location.reload()" class="w-1/3 bg-slate-100 text-slate-500 font-bold py-4 rounded-xl text-xs uppercase">Reset Form</button>
                <button type="button" onclick="sendDispatch()" class="w-2/3 brand-blue text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 text-xs uppercase tracking-widest">
                    🚀 Send Dispatch Email
                </button>
            </div>
        </form>
    </div>

    <script>
        let map, directionsService, directionsRenderer;
        
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), { 
                zoom: 4, 
                center: { lat: 39.8, lng: -98.5 }, 
                disableDefaultUI: true 
            });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map });
        }

        document.getElementById('locations').addEventListener('input', calculateRoute);

        function calculateRoute() {
            const lines = document.getElementById('locations').value.split('\n').filter(l => l.trim().length > 5);
            if (lines.length < 2) return;

            directionsService.route({
                origin: lines[0],
                destination: lines[lines.length - 1],
                waypoints: lines.slice(1, -1).map(loc => ({ location: loc, stopover: true })),
                optimizeWaypoints: true,
                travelMode: google.maps.TravelMode.DRIVING,
                unitSystem: google.maps.UnitSystem.IMPERIAL
            }, (result, status) => {
                if (status === "OK") {
                    directionsRenderer.setDirections(result);
                    let meters = 0, seconds = 0;
                    result.routes[0].legs.forEach(leg => { meters += leg.distance.value; seconds += leg.duration.value; });
                    document.getElementById('mileage_display').innerText = (meters * 0.000621371).toFixed(1);
                    const h = Math.floor(seconds / 3600);
                    const m = Math.floor((seconds % 3600) / 60);
                    document.getElementById('time_display').innerText = h > 0 ? h + "h " + m + "m" : m + "m";
                    document.getElementById('status_msg').innerText = "Route Optimized!";
                }
            });
        }

        function sendDispatch() {
            const email = document.getElementById('ic_email').value;
            const worker = document.getElementById('ic_name').value;
            const wo = document.getElementById('task_num').value;
            const mileage = document.getElementById('mileage_display').innerText;
            const time = document.getElementById('time_display').innerText;
            const comp = document.getElementById('comp').value;
            const date = document.getElementById('due_date').value;
            const addresses = document.getElementById('locations').value.split('\n').filter(a => a.trim().length > 2);
            
            if(!email || addresses.length < 2) { 
                alert("Please ensure Worker Email and Locations are filled out."); 
                return; 
            }

            // CLEAN GOOGLE MAPS URL
            const mapUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(addresses[0])}&destination=${encodeURIComponent(addresses[addresses.length-1])}&waypoints=${encodeURIComponent(addresses.slice(1,-1).join('|'))}&travelmode=driving`;

            // MODERNIZED EMAIL BODY
            const subject = `DISPATCH: Work Order #${wo}`;
            const body = 
                `TERRABOOST MEDIA | DISPATCH SUMMARY\n` +
                `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n` +
                `👤 WORKER: ${worker}\n` +
                `🆔 ORDER #: ${wo}\n` +
                `📅 DUE DATE: ${date}\n` +
                `💰 COMPENSATION: $${comp}\n\n` +
                `📍 ROUTE LOGISTICS\n` +
                `──────────────────────────\n` +
                `● Est. Total Distance: ${mileage} miles\n` +
                `● Est. Drive Duration: ${time}\n\n` +
                `📱 NAVIGATION (CLICK TO OPEN MAPS)\n` +
                `──────────────────────────\n` +
                `${mapUrl}\n\n` +
                `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n` +
                `INSTRUCTIONS:\n` +
                `1. Click the link above to open your optimized route.\n` +
                `2. Follow the sequence as provided.\n` +
                `3. Upload all required photos to Onfleet per stop.`;

            // Copy to clipboard
            navigator.clipboard.writeText(body);
            
            // Trigger Email
            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }

        window.onload = initMap;
    </script>
</body>
</html>
